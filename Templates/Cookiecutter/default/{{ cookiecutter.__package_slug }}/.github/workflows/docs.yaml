name: Documentation

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "README.md"
      - "CHANGELOG.md"
      - "CONTRIBUTING.md"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "README.md"
      - "CHANGELOG.md"
      - "CONTRIBUTING.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main

      - name: Install uv
        uses: astral-sh/setup-uv@21d5da3bc3126fc3b5b182828c8772282a6b694d # main
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install {{ cookiecutter.python_version }}

      - name: Install dependencies
        run: uv sync --group docs --all-extras

      - name: Build docs
        run: make docs-build

      - name: Upload pages artifact
        if: {% raw %}${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}{% endraw %}
        uses: actions/upload-pages-artifact@main
        with:
          path: site/

  deploy:
    if: {% raw %}${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}{% endraw %}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: {% raw %}${{ steps.deployment.outputs.page_url }}{% endraw %}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@main
