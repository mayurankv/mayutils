name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions: {}

jobs:
  release:
    name: Build, publish, and release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@ed73b5df24d31a50feea1e4d7296df2b5840941d # main
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install {{ cookiecutter.python_version }}

      - name: Build
        run: uv build

      - name: Publish to PyPI
        run: uv publish -t {% raw %}${{ secrets.PYPI_TOKEN }}{% endraw %}

      - name: Extract changelog entry
        id: changelog
        run: |
          uv run --with commitizen cz changelog \
            --dry-run \
            "{% raw %}${GITHUB_REF_NAME}{% endraw %}" > release_notes.md || true
          if [ ! -s release_notes.md ]; then
            echo "Release {% raw %}${GITHUB_REF_NAME}{% endraw %}" > release_notes.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: {% raw %}${{ secrets.GITHUB_TOKEN }}{% endraw %}
        run: |
          gh release create "{% raw %}${GITHUB_REF_NAME}{% endraw %}" \
            --title "{% raw %}${GITHUB_REF_NAME}{% endraw %}" \
            --notes-file release_notes.md \
            dist/*
