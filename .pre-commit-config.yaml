repos:
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
    -   id: ruff-format
        exclude: '(Templates/Cookiecutter/|^typings/)'

-   repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.8
    hooks:
    -   id: uv-lock

-   repo: local
    hooks:
    -   id: sort-pyproject
        name: Sort pyproject.toml
        entry: toml-sort -i --sort-table-keys --sort-inline-tables
        language: python
        files: ^pyproject\.toml$

-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: check-yaml
        exclude: '(^|/)mkdocs\.yml$|Templates/Cookiecutter/'
    -   id: end-of-file-fixer
        exclude: 'typings'
    -   id: trailing-whitespace
        exclude: 'typings'

-   repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
    -   id: mdformat
        exclude: 'Templates/Cookiecutter/'
        additional_dependencies:
        -   "mdformat-mkdocs[recommended]>=5.2.0b2"
        -   mdformat-pyproject
        # -   mdformat-ruff
        # -   mdformat-gfm

-   repo: local
    hooks:
    -   id: sqlfluff-fix
        name: sqlfluff fix
        entry: sqlfluff fix --dialect snowflake
        language: system
        types: [sql]
        # additional_dependencies: ['<dbt-adapter>', 'sqlfluff-templater-dbt']

-   repo: https://github.com/commitizen-tools/commitizen
    rev: v4.15.0
    hooks:
    -   id: commitizen
        stages: [commit-msg]

-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
    -   id: ruff-check
        exclude: '(Templates/Cookiecutter/|^typings/)'
        args: [--fix]
        stages: [pre-push]

-   repo: local
    hooks:
    -   id: ty
        name: ty check
        entry: uv run ty check
        language: system
        types_or: [python, jupyter]
        stages: [pre-push]

    -   id: pyright
        name: pyright check
        entry: uv run pyright
        language: system
        types_or: [python, jupyter]
        stages: [pre-push]

    -   id: uv-sync
        name: UV Sync Dependencies
        entry: uv sync --locked
        language: system
        pass_filenames: false
        stages: [pre-push]

    -   id: refresh-stubs
        name: Refresh pyright type stubs
        entry: uv run --extra all refresh_stubs --since HEAD
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|uv\.lock)$
        stages: [pre-push]

-   repo: https://github.com/numpy/numpydoc
    rev: v1.10.0
    hooks:
    -   id: numpydoc-validation
        exclude: '(Templates/Cookiecutter/|^typings/|^tests/)'
        stages: [pre-push]

-   repo: https://github.com/sqlfluff/sqlfluff
    rev: 4.1.0
    hooks:
    -   id: sqlfluff-lint
        args: [--dialect, snowflake]
        stages: [pre-push]
        # additional_dependencies: ['<dbt-adapter>', 'sqlfluff-templater-dbt']

-   repo: https://github.com/renovatebot/pre-commit-hooks
    rev: 43.150.0
    hooks:
    -   id: renovate-config-validator
        args: [--strict]
        stages: [pre-push]

-   repo: https://gitlab.com/vojko.pribudic.foss/pre-commit-update
    rev: v0.9.0
    hooks:
    -   id: pre-commit-update
        stages: [pre-push]
