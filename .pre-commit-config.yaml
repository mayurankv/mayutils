repos:
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
    -   id: ruff-check
        exclude: 'Templates/Cookiecutter/'
        args: [--fix]
    -   id: ruff-format
        exclude: 'Templates/Cookiecutter/'

-   repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.10
    hooks:
    -   id: commitizen
        stages: [commit-msg]
-   repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.7
    hooks:
    -   id: uv-lock
-   repo: local
    hooks:
    -   id: uv-sync
        name: UV Sync Dependencies
        entry: uv sync --locked
        language: system
        pass_filenames: false
        stages: [pre-push]
-   repo: local
    hooks:
    -   id: sort-pyproject
        name: Sort pyproject.toml
        entry: toml-sort -i --sort-table-keys --sort-inline-tables
        language: python
        files: ^pyproject\.toml$
-   repo: local
    hooks:
    -   id: refresh-stubs
        name: Refresh pyright type stubs
        entry: uv run --extra all refresh_stubs
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|uv\.lock)$
-   repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
    -   id: mdformat
        exclude: 'Templates/Cookiecutter/'
        additional_dependencies:
        -   "mdformat-mkdocs[recommended]>=5.2.0b2"
        -   mdformat-pyproject
        # -   mdformat-ruff
        # -   mdformat-gfm
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: check-yaml
        exclude: '(^|/)mkdocs\.yml$|Templates/Cookiecutter/'
    -   id: end-of-file-fixer
    -   id: trailing-whitespace
-   repo: https://gitlab.com/vojko.pribudic.foss/pre-commit-update
    rev: v0.9.0
    hooks:
    -   id: pre-commit-update
-   repo: local
    hooks:
    -   id: ty
        name: ty check
        entry: uv run ty check src/ tests/
        language: system
        types: [python, jupyter]
-   repo: https://github.com/sqlfluff/sqlfluff
    rev: 4.1.0
    hooks:
    -   id: sqlfluff-lint
        args: [--dialect, snowflake] #[--exclude-rules, L014,L016]
        # additional_dependencies: ['<dbt-adapter>', 'sqlfluff-templater-dbt']
    -   id: sqlfluff-fix
        args: [--dialect, snowflake] #[--rules, "LT02,CP02"]
        exclude: src/uk_loans_pricing_update_packs/data/queries/testing/
        # additional_dependencies: ['<dbt-adapter>', 'sqlfluff-templater-dbt']
-   repo: https://github.com/renovatebot/pre-commit-hooks
    rev: 43.141.2
    hooks:
    -   id: renovate-config-validator
        args: [--strict]
