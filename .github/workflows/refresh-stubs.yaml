name: Refresh Stubs

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  PR_BRANCH: chore/refresh-stubs
  PR_TITLE: "chore: refresh pyright type stubs"
  PR_BODY: |
    Automated refresh of third-party (pyright) and in-source plotly type stubs via `uv run refresh_stubs`.
    Review the diff for any upstream API changes that may break downstream code.
  STUBS_ARTIFACT: refreshed-typings

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@main

      - name: Install uv
        uses: astral-sh/setup-uv@c5680ec91f7b9b91406fab4ded5d45245abf7b67 # main
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Refresh type stubs
        run: uv run refresh_stubs --verbose

      - name: Validate regenerated stubs
        run: |
          uv run ty check src/ tests/
          uv run pyright

      - name: Detect changes
        id: diff
        run: |
          if [[ -n "$(git status --porcelain typings/ src/mayutils/visualisation/graphs/plotly/)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload refreshed typings
        if: steps.diff.outputs.changed == 'true'
        uses: actions/upload-artifact@main
        with:
          name: ${{ env.STUBS_ARTIFACT }}
          path: |
            typings/
            src/mayutils/visualisation/graphs/plotly/
          include-hidden-files: true
          retention-days: 1

  publish:
    runs-on: ubuntu-latest
    needs: refresh
    if: needs.refresh.outputs.changed == 'true'
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - uses: actions/checkout@main

      - name: Download refreshed typings
        uses: actions/download-artifact@main
        with:
          name: ${{ env.STUBS_ARTIFACT }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "${PR_BRANCH}"
          git add typings/ src/mayutils/visualisation/graphs/plotly/
          git commit -m "${PR_TITLE}"
          git push --force-with-lease origin "${PR_BRANCH}"

      - name: Ensure pull request exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh pr view "${PR_BRANCH}" --json number --jq '.number' >/dev/null 2>&1; then
            echo "PR already open for ${PR_BRANCH}; branch force-pushed so it now reflects the latest drift."
          else
            gh pr create \
              --base main \
              --head "${PR_BRANCH}" \
              --title "${PR_TITLE}" \
              --body "${PR_BODY}" \
              --label automated \
              --label stubs
          fi

      - name: Trigger CI on the stub-refresh branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run ci.yaml --ref "${PR_BRANCH}"
