site_name: mayutils
site_description: Utilities for Python from Mayuran Visakan
site_url: https://mayuran-visakan.github.io/mayutils/
repo_url: https://github.com/mayuran-visakan/mayutils
repo_name: mayuran-visakan/mayutils

theme:
  name: material
  icon:
    annotation: material/plus-circle
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - navigation.footer
    - navigation.tabs
    - navigation.top
    - header.autohide

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.smartsymbols
  - pymdownx.keys
  - pymdownx.highlight:
      use_pygments: true
      line_spans: __span
      pygments_lang_class: true
      linenums: true
      linenums_style: pymdownx-inline
      anchor_linenums: true
      auto_title: true
  - pymdownx.inlinehilite
  - pymdownx.betterem
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.snippets:
      base_path: ['.', 'docs']
      auto_append:
        - includes/abbreviations.md
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.critic:
      mode: view
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - abbr
  - attr_list
  - def_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true

hooks:
  - docs/hooks/readme_to_index.py
  - docs/hooks/generate_dependency_groups.py

plugins:
  - search
  - section-index
  - autorefs:
      resolve_closest: true
  - literate-nav:
      nav_file: SUMMARY.md
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            allow_inspection: true
            docstring_style: numpy
            docstring_section_style: spacy
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            merge_init_into_class: true
            show_if_no_docstring: false
            signature_crossrefs: true
            separate_signature: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guides:
      - Dependency Groups: guides/dependency-groups.md
      - Development: guides/development.md
      - Testing: guides/testing.md
      - Documentation: guides/documentation.md
  - Roadmap: roadmap.md
  - API Reference: reference/
  - Contributing: contributing.md
  - Changelog: changelog.md

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js
  - javascripts/tablesort.js
